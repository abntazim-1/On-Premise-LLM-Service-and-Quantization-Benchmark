name: Benchmark Smoke Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -e .
          
      - name: Verify shell scripts are executable
        run: |
          chmod +x scripts/*.sh
          
      - name: Check syntax (Linting)
        run: |
          pip install flake8
          flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run End-to-End Pipeline on Tiny Model (Smoke Test)
        run: |
          # Override configs for a fast CI test
          echo "model:" > configs/model.yaml
          echo "  id: 'TinyLlama/TinyLlama-1.1B-Chat-v1.0'" >> configs/model.yaml
          echo "  revision: 'main'" >> configs/model.yaml
          echo "quant_targets:" >> configs/model.yaml
          echo "  - 'gguf'" >> configs/model.yaml
          
          echo "quant_levels:" > configs/quant_gguf.yaml
          echo "  - 'q4_k_m'" >> configs/quant_gguf.yaml
          
          # Run the CPU-compatible parts of the pipeline
          make download
          make quantize-gguf
